<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <style>text{font-family:Arial,sans-serif;fill:#111}.title{font-size:24px;font-weight:bold}.box-title{font-size:17px;font-weight:bold}.body{font-size:14px}.box{fill:#f8f9fa;stroke:#222;stroke-width:2}.fact{fill:#eef5ff;stroke:#222;stroke-width:2}.line{stroke:#222;stroke-width:2;marker-end:url(#arrow)}</style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#222"/></marker></defs>
  <text x="40" y="45" class="title">Reporting Mart Dependencies: Business Questions Built from the Dimensional Model</text>
  <rect x="480" y="90" width="440" height="180" rx="10" class="fact"/><text x="500" y="125" class="box-title">warehouse.fact_service_requests</text><text x="500" y="160" class="body">request_count, resolution_hours, priority_flag, is_closed</text><text x="500" y="185" class="body">date/location/type/status keys</text><text x="500" y="210" class="body">joined to conformed dimensions</text>
  <rect x="60" y="390" width="300" height="160" rx="10" class="box"/><text x="80" y="425" class="box-title">request_volume_monthly</text><text x="80" y="460" class="body">Workload by month, type, borough</text><text x="80" y="485" class="body">Measures: total + priority requests</text>
  <rect x="390" y="390" width="300" height="160" rx="10" class="box"/><text x="410" y="425" class="box-title">response_time_distribution</text><text x="410" y="460" class="body">Slowest categories/locations</text><text x="410" y="485" class="body">avg, median, p90 hours</text>
  <rect x="720" y="390" width="300" height="160" rx="10" class="box"/><text x="740" y="425" class="box-title">priority_request_trends</text><text x="740" y="460" class="body">Escalation pressure over time</text><text x="740" y="485" class="body">priority rate % by borough</text>
  <rect x="1050" y="390" width="300" height="160" rx="10" class="box"/><text x="1070" y="425" class="box-title">open_request_backlog</text><text x="1070" y="460" class="body">Unresolved service workload</text><text x="1070" y="485" class="body">open count by date/type/location</text>
  <line x1="700" y1="270" x2="210" y2="390" class="line"/><line x1="700" y1="270" x2="540" y2="390" class="line"/><line x1="700" y1="270" x2="870" y2="390" class="line"/><line x1="700" y1="270" x2="1200" y2="390" class="line"/>
  <text x="70" y="660" class="body">Design principle: analysts query business-ready summaries instead of rebuilding the same joins for every dashboard.</text>
</svg>
